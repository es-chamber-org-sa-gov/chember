<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার গ্যালারি</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 90%;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 15px;
        }
        h2 { color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">ছবি লোড হচ্ছে...</h2>
    <div id="image-container"></div>
</div>

<script>
    // ১. গিটহাবের ইউজারনেম এবং রেপোজিটরি নাম এখানে দিন
    const githubUser = "YOUR_GITHUB_USERNAME"; 
    const repoName = "YOUR_REPO_NAME"; 

    // ২. URL থেকে ছবির নাম উদ্ধার করা (?image=filename.jpg)
    const urlParams = new URLSearchParams(window.location.search);
    const imageName = urlParams.get('image');

    const titleElement = document.getElementById('title');
    const container = document.getElementById('image-container');

    if (imageName) {
        // গিটহাবের র-ফাইল (Raw File) এর লিংক তৈরি করা
        const imageUrl = `https://github.com/es-chamber-org-sa-gov/chember/tree/main/File`;
        
        titleElement.innerText = "আপনার ফাইল:";
        container.innerHTML = `<img src="${imageUrl}" alt="${imageName}" onerror="this.onerror=null; alert('ফাইলটি পাওয়া যায়নি!')">`;
    } else {
        titleElement.innerText = "দয়া করে কিউআর কোড স্ক্যান করে সঠিক লিংক দিয়ে প্রবেশ করুন।";
    }
</script>

</body>
</html>
